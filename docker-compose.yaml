version: "3.8"

services:
  backend:
    image: 615343673177.dkr.ecr.ap-south-1.amazonaws.com/devops-backend:latest
    container_name: django-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=*
    restart: always

  frontend:
    image: 615343673177.dkr.ecr.ap-south-1.amazonaws.com/devops-frontend:latest
    container_name: react-frontend
    ports:
      - "80:8080"
    environment:
      - VITE_API_URL=http://backend:8000/api/hello/
    depends_on:
      - backend
    restart: always

