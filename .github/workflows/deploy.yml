name: DevOps Full CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ===============================
      # Terraform - Create Infrastructure First
      # ===============================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Import existing resources
        working-directory: terraform
        run: |
          terraform import aws_security_group.app_sg $(aws ec2 describe-security-groups --filters "Name=group-name,Values=devops-app-sg" --query "SecurityGroups[0].GroupId" --output text) 2>/dev/null || true
          terraform import aws_iam_role.ec2_role devops-ec2-ecr-role 2>/dev/null || true
          terraform import aws_iam_instance_profile.ec2_profile devops-ec2-instance-profile 2>/dev/null || true
          terraform import aws_ecr_repository.backend_repo devops-backend 2>/dev/null || true
          terraform import aws_ecr_repository.frontend_repo devops-frontend 2>/dev/null || true
        continue-on-error: true

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      # ===============================
      # Login to ECR
      # ===============================
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ===============================
      # Build & Push Backend
      # ===============================
      - name: Build & Push Backend
        run: |
          docker build -t backend ./backend
          docker tag backend:latest ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}

      # ===============================
      # Build & Push Frontend
      # ===============================
      - name: Build & Push Frontend
        run: |
          docker build -t frontend ./frontend
          docker tag frontend:latest ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}

      # ===============================
      # Get EC2 Public IP
      # ===============================
      - name: Get EC2 Public IP
        working-directory: terraform
        run: |
          echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

      # ===============================
      # Deploy to EC2
      # ===============================
      - name: SSH into EC2 and deploy Angular app
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            docker pull ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}
            docker pull ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}

            docker stop backend || true
            docker rm backend || true
            docker stop frontend || true
            docker rm frontend || true

            docker run -d -p 8000:8000 --name backend \
            ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}

            docker run -d -p 80:80 --name frontend \
            ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}
            EOF