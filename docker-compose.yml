version: "3.9"
services:
  backend:
    build: ./backend
    container_name: backend_container
    ports:
      - "5000:5000"
    environment:
      - DEBUGE=True
      - ALLOWED_HOSTS=*
      
    networks:
      - app-network
  frontend:
    build: ./frontend
    container_name: frontend_container
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network
networks:
  app-network:
